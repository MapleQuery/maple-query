- id: nt06
  question: "Combined Main Estimates for 2024-25 and 2025-26"
  kind: multi_year_ok
  expect:
    derivation_captured: true
    result_value_present: true
    magnitude_finding: cross_source_sum
    disposition: caveat
  recorded_derivation:
    aggregation: SUM
    value_columns: ["Amount"]
    unit_scale: dollars
    row_count: 1
    source_row_estimate: 4200
    result_value: 910000000000
    source_packages: ["est-main-2024-25", "est-main-2025-26"]
    dataset_titles:
      - "Main Estimates 2024-25"
      - "Main Estimates 2025-26"
  notes: >
    A LEGITIMATE two-year combined total the user explicitly asked for.
    Must still be flagged (the intent is auditable) and shipped WITH a
    caveat — never rejected, and never a wasted retry.

- id: nt07
  question: "What is the total grant amount in the innovation program dataset?"
  kind: unknown_units
  expect:
    derivation_captured: true
    result_value_present: true
    magnitude_finding: unknown_units
    disposition: caveat
  recorded_derivation:
    aggregation: SUM
    value_columns: ["grant_value"]
    unit_scale: unknown
    row_count: 1
    source_row_estimate: 45      # below the floor min_rows, so only units fires
    result_value: 620000000      # plausible magnitude, but scale unproven
    source_packages: ["innovation-grants-2023"]
    dataset_titles: ["Innovation Program Grants 2023"]
  notes: >
    A plausibly-sized monetary total whose column scale could not be
    established; must ship with a units caveat, never silently as dollars.
