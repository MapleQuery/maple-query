# Agent-behaviour eval fixture derived from the 2026-07-02 Braintrust
# export (one day of real agent traffic; every distinct user turn in
# the export becomes one entry, in chronological order).
#
# Schema (validated by core/agent_eval.load_agent_question_set):
#   id        — unique, stable; keyed to the export date.
#   question  — the user's message, verbatim.
#   source    — provenance tag.
#   expected  — the labels a well-behaved agent should hit:
#     triage:  in_scope | off_scope | meta | clarify
#     outcome: answered | no_data | deflected | clarify
#     packages_any_of: package UUIDs, when the right dataset is known.
#     must_caveat: the answer only counts if it flags its own fit gap.
#   observed_v1 — what the v1 loop actually did in the export
#     (free-form outcome + note; the "before" picture for the labels).
#
# expected.triage doubles as the label set for scope-triage training;
# expected.outcome + must_caveat feed answer-parity rubrics.

- id: trace-2026-07-02-001
  question: "How has immigration PR processing time changed since 2019?"
  source: braintrust-export-2026-07-02
  expected:
    triage: in_scope
    outcome: answered
    packages_any_of: []
  observed_v1:
    outcome: surrendered
    note: >-
      Two search_datasets calls with identical phrasing, no
      reformulation; closest hits were passport processing times.
      IRCC processing-time data likely exists under different
      vocabulary.

- id: trace-2026-07-02-002
  question: "Compare housing grant approvals across provinces since 2020."
  source: braintrust-export-2026-07-02
  expected:
    triage: in_scope
    outcome: answered
    must_caveat: true
  observed_v1:
    outcome: answered_wrong_fit
    note: >-
      Answered from the one-time Canada Housing Benefit top-up — a
      single program with mostly-missing province values — without
      flagging that it is not a multi-year provincial approvals
      series.

