# 20-question retrieval-validation fixture (4.6).
#
# Committed regression-test surface for the semantic layer. Two runs
# against the same warehouse must be diffable; a sampled fixture would
# dilute the signal.
#
# `expected_packages` / `expected_columns` are the operator's stated
# expectation. Empty lists contribute 1.0 to per-question recall
# (vacuous case, documented in the report header). Populate over
# iterations against CKAN search + `raw.documents` sanity checks.
#
# UUIDs below are placeholders — replace with real CKAN package_ids
# after the first `--no-execute` pass surfaces which packages the
# retriever actually finds for each domain.

- id: q01
  question: "How much did the federal government spend on housing in 2020?"
  domain: housing
  expected_packages: []
  expected_columns:
    - "TOT_EXP"
    - "FISCAL_YEAR"
  must_return_rows: true
  notes: |
    Authoritative answer is in CFR housing tables; agent should not
    retrieve provincial datasets.

